name: AlphaCare Insurance Analytics CI

# Trigger this workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ main, task-1, task-2, task-3, task-4 ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Fetch your code from the GitHub repository
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    # Step 2: Set up the correct Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install all required project packages
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Lint code to check for broken syntax or structural formatting mistakes
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings to keep things moving if formatting isn't perfect
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics